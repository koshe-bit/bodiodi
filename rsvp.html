<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Bodiodi — Reserve</title>

  <!-- Fonts -->
  <link rel="stylesheet" href="https://use.typekit.net/xtw4aqt.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Global Styles -->
  <link rel="stylesheet" href="assets/global.css?v=5">

  <style>
    .reserve-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px;
    }

    .member-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 14px;
      color: #666;
    }

    .class-card {
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      background: #fff;
    }

    .class-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .class-info {
      flex: 1;
      min-width: 200px;
    }

    .class-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .class-time {
      font-size: 14px;
      color: #777;
    }

    .reserve-btn {
      background: #EDEC87;
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .reserve-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* NEW STATUS TEXT */
    .class-status {
      margin-top: 8px;
      font-size: 12px;
      color: #999;
      font-weight: 400;
    }
  </style>
</head>

<body>
  <div class="reserve-wrap">

    <div class="member-bar" id="memberBar">
      Loading member...
    </div>

    <div id="classList"></div>

  </div>

<script>
const API_URL = "YOUR_WEB_APP_URL_HERE";

/* ---------- GET MEMBER ---------- */
async function getMember(memberId) {
  const res = await fetch(`${API_URL}?action=lookup&memberId=${memberId}`);
  return await res.json();
}

/* ---------- GET SCHEDULE ---------- */
async function getSchedule() {
  const res = await fetch(`${API_URL}?action=schedule`);
  return await res.json();
}

/* ---------- RSVP ---------- */
async function reserve(classItem, memberId) {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      member_id: memberId,
      class_id: classItem.classId,
      class_name: classItem.className,
      class_start_iso: classItem.classStartISO,
      policy_confirmed: true
    })
  });

  // refresh schedule after booking
  init();
}

/* ---------- RENDER ---------- */
function renderClasses(classes, memberId) {
  const container = document.getElementById("classList");
  container.innerHTML = "";

  classes.forEach(cls => {
    const card = document.createElement("div");
    card.className = "class-card";

    card.innerHTML = `
      <div class="class-row">
        <div class="class-info">
          <div class="class-name">${cls.className}</div>
          <div class="class-time">${formatTime(cls.classStartISO)}</div>
        </div>

        <button class="reserve-btn" ${cls.isFull ? "disabled" : ""}>
          ${cls.isFull ? "Full" : "Reserve"}
        </button>
      </div>

      <div class="class-status">${cls.statusLabel || ""}</div>
    `;

    const btn = card.querySelector("button");

    if (!cls.isFull) {
      btn.addEventListener("click", () => reserve(cls, memberId));
    }

    container.appendChild(card);
  });
}

/* ---------- TIME FORMAT ---------- */
function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

/* ---------- INIT ---------- */
async function init() {
  const params = new URLSearchParams(window.location.search);
  const memberId = params.get("id");

  const member = await getMember(memberId);
  const schedule = await getSchedule();

  document.getElementById("memberBar").innerText =
    `${member.first} ${member.last} · ${member.planType}`;

  renderClasses(schedule, memberId);
}

init();
</script>

</body>
</html>
